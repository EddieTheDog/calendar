<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #6ee7b7;
      --accent2: #818cf8;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --danger: #f87171;
      --warn: #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(110,231,183,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110,231,183,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Login Screen ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }
    .login-box h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .login-box p { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
    .login-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 0.2em;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-box button:hover { opacity: 0.85; }
    .login-error { color: var(--danger); font-size: 11px; margin-top: 10px; }

    /* ── Main Layout ── */
    #app { display: none; position: relative; z-index: 1; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-brand {
      font-family: 'Instrument Serif', serif;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-brand span { color: var(--accent); }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-danger { background: rgba(248,113,113,0.1); color: var(--danger); border-color: rgba(248,113,113,0.3); }
    .btn-danger:hover { background: rgba(248,113,113,0.2); }
    .btn-sm { padding: 5px 10px; font-size: 11px; }

    .main { max-width: 960px; margin: 0 auto; padding: 40px 24px; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      gap: 16px;
    }
    .page-header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      font-weight: 400;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 24px;
      flex: 1;
      min-width: 120px;
    }
    .stat-value { font-family: 'Instrument Serif', serif; font-size: 2rem; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.1em; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-toolbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .table-toolbar input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
    .table-toolbar input:focus { border-color: var(--accent); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 20px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 14px 20px; font-size: 12px; vertical-align: middle; }

    .cal-name-cell { display: flex; align-items: center; gap: 10px; }
    .color-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cal-name-text { font-weight: 500; color: var(--text); }
    .cal-slug { font-size: 10px; color: var(--muted); }

    .empty-row td { text-align: center; padding: 60px; color: var(--muted); font-size: 12px; }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
      animation: modalIn 0.2s ease;
    }
    .modal h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 24px;
    }
    @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .color-chip {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-chip:hover { transform: scale(1.15); }
    .color-chip.selected { border-color: white; transform: scale(1.15); }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
    }

    /* Confirm modal */
    .confirm-modal { max-width: 380px; text-align: center; }
    .confirm-modal p { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 999;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .stats { flex-direction: column; }
      td:nth-child(3), th:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-box">
    <h2>Admin Access</h2>
    <p>Enter your admin password to continue.</p>
    <input type="password" id="pwd-input" placeholder="••••••••" autocomplete="current-password" />
    <button onclick="doLogin()">Unlock →</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">📅 <span>Calendar</span> Admin</div>
    <div class="topbar-actions">
      <a href="calendars.html" class="btn btn-ghost btn-sm" target="_blank">↗ Public page</a>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <h1>Calendars</h1>
      <button class="btn btn-primary" onclick="openCreate()">+ New Calendar</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total Calendars</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-active">—</div>
        <div class="stat-label">Active</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-toolbar">
        <input type="text" id="admin-search" placeholder="Search…" oninput="filterTable()" />
        <button class="btn btn-ghost btn-sm" onclick="loadCalendars()">↻ Refresh</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Slug</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="cal-tbody">
          <tr class="empty-row"><td colspan="5">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Create/Edit Modal ── -->
<div class="modal-backdrop" id="form-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">New Calendar</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Calendar Name *</label>
        <input type="text" id="f-name" placeholder="e.g. LA Food Events" oninput="autoSlug()" />
      </div>
      <div class="form-group">
        <label>Slug (URL key) *</label>
        <input type="text" id="f-slug" placeholder="la-food-events" />
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Short description shown to subscribers…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="active">Active</option>
          <option value="draft">Draft (hidden)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Color</label>
        <div class="color-row" id="color-picker"></div>
        <input type="hidden" id="f-color" value="#6ee7b7" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeFormModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCalendar()">Save Calendar</button>
    </div>
  </div>
</div>

<!-- ── Confirm Delete Modal ── -->
<div class="modal-backdrop" id="confirm-modal" style="display:none">
  <div class="modal confirm-modal">
    <h2>Delete Calendar?</h2>
    <p id="confirm-msg">This will permanently remove the calendar and its .ics feed. Subscribers will lose access.</p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn btn-ghost" onclick="document.getElementById('confirm-modal').style.display='none'">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const API_BASE    = 'https://YOUR_WORKER.YOUR_NAME.workers.dev'; // ← change this
  const ADMIN_PASS  = 'changeme123'; // ← change this (or use Worker-side auth)
  // ─────────────────────────────────────────────────────────

  const COLORS = ['#6ee7b7','#818cf8','#f472b6','#fb923c','#facc15','#38bdf8','#a78bfa','#34d399','#f87171','#e879f9'];

  let allCalendars = [];
  let editingId = null;

  // ── Auth ──
  function doLogin() {
    const val = document.getElementById('pwd-input').value;
    if (val === ADMIN_PASS) {
      sessionStorage.setItem('cal_admin', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadCalendars();
    } else {
      document.getElementById('login-err').textContent = 'Incorrect password.';
    }
  }
  document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function doLogout() {
    sessionStorage.removeItem('cal_admin');
    location.reload();
  }

  if (sessionStorage.getItem('cal_admin') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  // ── Color picker ──
  function buildColorPicker(selected) {
    const el = document.getElementById('color-picker');
    el.innerHTML = COLORS.map(c => `
      <div class="color-chip ${c === selected ? 'selected' : ''}"
           style="background:${c}"
           onclick="pickColor('${c}')"
           title="${c}"></div>
    `).join('');
  }
  function pickColor(c) {
    document.getElementById('f-color').value = c;
    buildColorPicker(c);
  }

  // ── Slug auto-gen ──
  function autoSlug() {
    if (editingId) return; // don't overwrite on edit
    const v = document.getElementById('f-name').value;
    document.getElementById('f-slug').value = v.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  // ── Load ──
  async function loadCalendars() {
    try {
      const res = await fetch(`${API_BASE}/api/calendars?all=1`, {
        headers: { 'X-Admin-Pass': ADMIN_PASS }
      });
      allCalendars = await res.json();
      renderTable(allCalendars);
      document.getElementById('stat-total').textContent = allCalendars.length;
      document.getElementById('stat-active').textContent = allCalendars.filter(c => c.status !== 'draft').length;
    } catch (e) {
      showToast('Could not load calendars — check API_BASE', true);
    }
  }

  // ── Render ──
  function renderTable(cals) {
    const tbody = document.getElementById('cal-tbody');
    if (!cals.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="5">No calendars yet. Create one!</td></tr>`;
      return;
    }
    tbody.innerHTML = cals.map(c => `
      <tr>
        <td>
          <div class="cal-name-cell">
            <div class="color-swatch" style="background:${c.color || '#6ee7b7'}"></div>
            <span class="cal-name-text">${escHtml(c.name)}</span>
          </div>
        </td>
        <td><span class="cal-slug">${escHtml(c.slug)}</span></td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${escHtml(c.description || '')}</td>
        <td>
          <span style="font-size:10px;padding:3px 8px;border-radius:4px;
            background:${c.status === 'draft' ? 'rgba(251,191,36,0.1)' : 'rgba(110,231,183,0.1)'};
            color:${c.status === 'draft' ? 'var(--warn)' : 'var(--accent)'}">
            ${c.status === 'draft' ? 'Draft' : 'Active'}
          </span>
        </td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${c.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete(${c.id}, '${escHtml(c.name)}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterTable() {
    const q = document.getElementById('admin-search').value.toLowerCase();
    renderTable(allCalendars.filter(c =>
      c.name.toLowerCase().includes(q) || c.slug.toLowerCase().includes(q)
    ));
  }

  // ── Create ──
  function openCreate() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'New Calendar';
    document.getElementById('f-name').value = '';
    document.getElementById('f-slug').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-status').value = 'active';
    document.getElementById('f-color').value = '#6ee7b7';
    buildColorPicker('#6ee7b7');
    document.getElementById('form-modal').style.display = 'flex';
  }

  // ── Edit ──
  function openEdit(id) {
    const cal = allCalendars.find(c => c.id === id);
    if (!cal) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Calendar';
    document.getElementById('f-name').value = cal.name;
    document.getElementById('f-slug').value = cal.slug;
    document.getElementById('f-desc').value = cal.description || '';
    document.getElementById('f-status').value = cal.status || 'active';
    document.getElementById('f-color').value = cal.color || '#6ee7b7';
    buildColorPicker(cal.color || '#6ee7b7');
    document.getElementById('form-modal').style.display = 'flex';
  }

  // ── Save ──
  async function saveCalendar() {
    const name  = document.getElementById('f-name').value.trim();
    const slug  = document.getElementById('f-slug').value.trim();
    const desc  = document.getElementById('f-desc').value.trim();
    const color = document.getElementById('f-color').value;
    const status = document.getElementById('f-status').value;

    if (!name || !slug) { showToast('Name and slug are required', true); return; }

    const body = { name, slug, description: desc, color, status };
    const url  = editingId ? `${API_BASE}/api/calendars/${editingId}` : `${API_BASE}/api/calendars`;
    const method = editingId ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'X-Admin-Pass': ADMIN_PASS },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
      showToast(editingId ? 'Calendar updated!' : 'Calendar created!');
      closeFormModal();
      loadCalendars();
    } catch (e) {
      showToast('Save failed: ' + e.message, true);
    }
  }

  // ── Delete ──
  function confirmDelete(id, name) {
    document.getElementById('confirm-msg').textContent =
      `"${name}" will be permanently deleted. Subscribers will lose access.`;
    document.getElementById('confirm-ok-btn').onclick = () => deleteCalendar(id);
    document.getElementById('confirm-modal').style.display = 'flex';
  }

  async function deleteCalendar(id) {
    document.getElementById('confirm-modal').style.display = 'none';
    try {
      const res = await fetch(`${API_BASE}/api/calendars/${id}`, {
        method: 'DELETE',
        headers: { 'X-Admin-Pass': ADMIN_PASS }
      });
      if (!res.ok) throw new Error(await res.text());
      showToast('Calendar deleted.');
      loadCalendars();
    } catch (e) {
      showToast('Delete failed: ' + e.message, true);
    }
  }

  // ── Modals ──
  function closeFormModal() { document.getElementById('form-modal').style.display = 'none'; }
  function closeModal(e) { if (e.target === document.getElementById('form-modal')) closeFormModal(); }

  // ── Toast ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error show' : 'show';
    setTimeout(() => t.className = '', 2800);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // init color picker
  buildColorPicker('#6ee7b7');
</script>
</body>
</html>
