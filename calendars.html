<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Your Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
      --border: #2a2a3d; --accent: #6ee7b7; --text: #e8e8f0; --muted: #6b6b8a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(110,231,183,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(110,231,183,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .glow-orb  { position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(110,231,183,0.06) 0%, transparent 70%); top: -200px; right: -200px; pointer-events: none; z-index: 0; }
    .glow-orb2 { position: fixed; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(129,140,248,0.05) 0%, transparent 70%); bottom: -100px; left: -100px; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 24px; }
    header { padding: 48px 0 0; animation: fadeDown 0.6s ease both; }
    .eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--accent); }
    h1 { font-family: 'Instrument Serif', serif; font-size: clamp(2.8rem, 6vw, 4.5rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 20px; }
    h1 em { color: var(--accent); font-style: italic; }
    .subtitle { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 480px; margin-bottom: 48px; }
    .search-wrap { position: relative; margin-bottom: 48px; animation: fadeUp 0.6s 0.2s ease both; }
    .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 14px 14px 44px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
    #calendars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 80px; }
    .cal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.5s ease both; }
    .cal-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(110,231,183,0.08); }
    .cal-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .cal-color-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .cal-name { font-family: 'Instrument Serif', serif; font-size: 1.25rem; font-weight: 400; }
    .cal-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; min-height: 36px; }
    .subscribe-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .subscribe-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .sub-btn { display: flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid transparent; text-decoration: none; transition: all 0.15s; white-space: nowrap; }
    .sub-btn.apple   { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: var(--text); }
    .sub-btn.apple:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .sub-btn.google  { background: rgba(66,133,244,0.1); border-color: rgba(66,133,244,0.3); color: #7ab3f8; }
    .sub-btn.google:hover { background: rgba(66,133,244,0.2); }
    .sub-btn.outlook { background: rgba(0,120,212,0.1); border-color: rgba(0,120,212,0.3); color: #60a5fa; }
    .sub-btn.outlook:hover { background: rgba(0,120,212,0.2); }
    .sub-btn.download { background: rgba(110,231,183,0.08); border-color: rgba(110,231,183,0.25); color: var(--accent); }
    .sub-btn.download:hover { background: rgba(110,231,183,0.15); }
    .loading-state, .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); font-size: 13px; }
    .loading-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin: 0 3px; animation: bounce 1.2s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface2); border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; border-radius: 8px; font-size: 12px; z-index: 999; transition: transform 0.3s ease; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    footer { text-align: center; padding: 32px 0 48px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 40px; }
    @keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(16px);  } to { opacity:1; transform: none; } }
    @keyframes bounce   { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="glow-orb"></div>
  <div class="glow-orb2"></div>
  <div class="container">
    <header>
      <div class="eyebrow">Subscribe</div>
      <h1>Get your <em>calendar.</em></h1>
      <p class="subtitle">Pick a calendar below and add it directly to Apple Calendar, Google Calendar, Outlook, or download the .ics file. It stays up to date automatically.</p>
    </header>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search calendars…" />
    </div>
    <div id="calendars-grid">
      <div class="loading-state">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p style="margin-top:16px;">Loading calendars…</p>
      </div>
    </div>
  </div>
  <footer><div class="container">Calendars update automatically — no app needed.</div></footer>
  <div id="toast"></div>

  <script>
    const API_BASE = 'https://calendar-8wm.pages.dev';

    let allCalendars = [];

    async function loadCalendars() {
      try {
        const res = await fetch(`${API_BASE}/api/calendars`);
        if (!res.ok) throw new Error();
        allCalendars = await res.json();
        renderCalendars(allCalendars);
      } catch {
        document.getElementById('calendars-grid').innerHTML =
          `<div class="empty-state"><p>Could not load calendars.<br><small>Check that your Worker is deployed.</small></p></div>`;
      }
    }

    function renderCalendars(cals) {
      const grid = document.getElementById('calendars-grid');
      if (!cals.length) { grid.innerHTML = `<div class="empty-state"><p>No calendars found.</p></div>`; return; }
      grid.innerHTML = cals.map((cal, i) => {
        const icsUrl    = `${API_BASE}/api/calendars/${cal.slug}/ics`;
        const webcalUrl = icsUrl.replace(/^https?/, 'webcal');
        const googleUrl = `https://calendar.google.com/calendar/r?cid=${encodeURIComponent(icsUrl)}`;
        const outlookUrl = `https://outlook.office.com/owa/?path=/calendar/action/compose&rru=addsubscription&url=${encodeURIComponent(icsUrl)}&name=${encodeURIComponent(cal.name)}`;
        return `
        <div class="cal-card" style="animation-delay:${i*0.07}s">
          <div class="cal-header">
            <div class="cal-color-dot" style="background:${cal.color||'#6ee7b7'}"></div>
            <div class="cal-name">${esc(cal.name)}</div>
          </div>
          <p class="cal-desc">${esc(cal.description||'')}</p>
          <div class="subscribe-label">Subscribe via</div>
          <div class="subscribe-btns">
            <a class="sub-btn apple" href="${webcalUrl}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
              Apple Calendar
            </a>
            <a class="sub-btn google" href="${googleUrl}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19.5 3h-15C3.12 3 2 4.12 2 5.5v13C2 19.88 3.12 21 4.5 21h15c1.38 0 2.5-1.12 2.5-2.5v-13C22 4.12 20.88 3 19.5 3zm.5 15.5c0 .28-.22.5-.5.5h-15c-.28 0-.5-.22-.5-.5V9h16v9.5zM4 7V5.5c0-.28.22-.5.5-.5H6V7H4zm4 0V5h3v2H8zm5 0V5h3v2h-3zm5 0V5h.5c.28 0 .5.22.5.5V7h-1z"/></svg>
              Google Calendar
            </a>
            <a class="sub-btn outlook" href="${outlookUrl}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M7 13h10v1H7zm0 3h7v1H7zm12-9h-3V5.5C16 4.12 14.88 3 13.5 3h-9C3.12 3 2 4.12 2 5.5v13C2 19.88 3.12 21 4.5 21H13c.55 0 1-.45 1-1v-1h5c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-8 9H4.5c-.28 0-.5-.22-.5-.5v-13c0-.28.22-.5.5-.5h9c.28 0 .5.22.5.5V7h-4c-1.1 0-2 .9-2 2v8c0 .55.45 1 1 1zm8-2h-5V9h5v11z"/></svg>
              Outlook
            </a>
            <button class="sub-btn download" onclick="downloadIcs('${icsUrl}','${esc(cal.name)}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download .ics
            </button>
          </div>
        </div>`;
      }).join('');
    }

    async function downloadIcs(url, name) {
      try {
        const blob = await (await fetch(url)).blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${name.replace(/\s+/g,'-').toLowerCase()}.ics`;
        a.click();
        showToast('Downloaded ' + name + '.ics');
      } catch { showToast('Download failed'); }
    }

    document.getElementById('search-input').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      renderCalendars(allCalendars.filter(c => c.name.toLowerCase().includes(q) || (c.description||'').toLowerCase().includes(q)));
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    loadCalendars();
  </script>
</body>
</html>
